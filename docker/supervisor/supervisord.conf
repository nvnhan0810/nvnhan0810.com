[supervisord]
nodaemon=true
logfile=/dev/null
pidfile=/tmp/supervisord.pid
user=root

[program:php-fpm]
command=/usr/local/sbin/php-fpm -F
priority=10
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
priority=20
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:inertia-ssr]
process_name=%(program_name)s
command=/usr/local/bin/node /var/www/html/bootstrap/ssr/ssr.js
directory=/var/www/html
user=www-data
autostart=true
autorestart=true
startsecs=2
stopwaitsecs=10
stdout_logfile=/var/www/html/storage/logs/inertia-ssr.log
stderr_logfile=/var/www/html/storage/logs/inertia-ssr.log

[program:queue]
process_name=%(program_name)s
command=/usr/local/bin/php /var/www/html/artisan queue:work --sleep=3 --tries=3 --max-time=3600
directory=/var/www/html
user=www-data
autostart=true
autorestart=true
stdout_logfile=/var/www/html/storage/logs/queue.log
stderr_logfile=/var/www/html/storage/logs/queue.log
