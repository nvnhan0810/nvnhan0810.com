name: Publish Docker image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      deploy_only:
        description: 'Skip build, only trigger deploy webhook'
        type: boolean
        default: false
      image_tag:
        description: 'Image tag (7-char SHA) when deploy_only=true. Empty = current commit SHA.'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DEPLOY_REPO: nvnhan0810_com
  DEPLOY_TAG: production

jobs:
  build-and-push:
    if: github.event_name != 'workflow_dispatch' || inputs.deploy_only != true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_URL=https://nvnhan0810.com
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    if: always() && (needs.build-and-push.result == 'success' || needs.build-and-push.result == 'skipped')
    runs-on: ubuntu-latest

    steps:
      - name: Resolve image tag
        id: image
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.image_tag }}" ]; then
            TAG="${{ inputs.image_tag }}"
          else
            TAG="${GITHUB_SHA:0:7}"
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Deploying image tag: ${TAG}"

      - name: Trigger deploy webhook
        env:
          DEPLOY_HOOK_TOKEN: ${{ secrets.DEPLOY_HOOK_TOKEN }}
          DEPLOY_WEBHOOK_TOKEN: ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}
        run: |
          DEPLOY_TOKEN="${DEPLOY_HOOK_TOKEN:-$DEPLOY_WEBHOOK_TOKEN}"
          if [ -z "${DEPLOY_TOKEN}" ]; then
            echo "DEPLOY_HOOK_TOKEN secret is not set — skip deploy webhook."
            exit 0
          fi

          IMAGE="ghcr.io/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')"
          IMAGE_TAG="${{ steps.image.outputs.tag }}"

          curl -fsS --max-time 30 -X POST 'https://deploy.nvnhan0810.com/deploy' \
            -H "Authorization: Bearer ${DEPLOY_TOKEN}" \
            -H 'Content-Type: application/json' \
            -d "$(jq -n \
              --arg repo "${{ env.DEPLOY_REPO }}" \
              --arg tag "${{ env.DEPLOY_TAG }}" \
              --arg image "${IMAGE}" \
              --arg image_tag "${IMAGE_TAG}" \
              '{repo: $repo, tag: $tag, image: $image, image_tag: $image_tag}')"

          echo "Deploy webhook sent for ${IMAGE}:${IMAGE_TAG}"
